}

// 演員詳細頁專用的作品清單渲染：若這位演員在同一部作品被記錄看過不只一次（重刷），
// 合併顯示為「劇名（N次）」，並把徽章換成「這位演員」的個人場次，而不是全劇總場次
// （全劇總場次可能包含其他卡司，跟這位演員無關）。
function renderActorWorksList(list, el, name){
  el.className='gallery';
  el.innerHTML = list.map(d=>{
    const personalCount = getActorViewCountInWork(d,name);
    const nameLabel = personalCount>1 ? `${esc(d.name)}（${personalCount}次）` : esc(d.name);
    const badge = d.category==='musical'
      ? (personalCount>0
          ? `<span class="po-badge" style="background:#7C6FE0;color:#fff"><i class="ti ti-music" style="font-size:10px"></i> ${personalCount}次</span>`
          : `<span class="po-badge" style="background:#7C6FE0;color:#fff"><i class="ti ti-music" style="font-size:10px"></i> 候選卡司</span>`)
      : `<span class="po-badge ${d.status==='done'?'po-done':d.status==='dropped'?'po-dropped':'po-ongoing'}">${d.status==='done'?'看完':d.status==='dropped'?'棄劇':'觀看中'}</span>`;
    return `
    <div class="poster-card" onclick="openWorkFromActorCard('${d.id}')">
      ${d.favorite?`<div class="fav-badge"><i class="ti ti-star-filled"></i></div>`:''}
      ${d.poster?`<img src="${posterSrc(d)}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display='none';this.parentElement.querySelector('.poster-placeholder').style.display='flex'">`:''}
      <div class="poster-placeholder" style="display:${d.poster?'none':'flex'}"><div class="ph-icon"><i class="ti ti-device-tv"></i></div><div class="ph-name">${esc(d.name)}</div>${d.orig?`<div class="ph-orig">${esc(d.orig)}</div>`:''}</div>
      <div class="poster-overlay">
        <div class="po-name">${nameLabel}</div>
        <div class="po-score">${[d.rating&&d.rating>0?'⭐ '+parseFloat(d.rating).toFixed(1):'',episodeLabel(d)].filter(Boolean).join(' · ')}</div>
        ${badge}
      </div>
    </div>`;
  }).join('');
}

// 從演員懸浮卡片點擊作品時使用：先清空 hash 讓卡片與總表頁面關閉，
// 再開作品詳細頁，避免兩層彈窗疊在一起。音樂劇會看到多刷紀錄／卡司；
// 電視劇會看到「集數」等資訊——都是同一個 openDetail()，只是資料不同。
function openWorkFromActorCard(id){
  // 保留在「人物總表」這一層（而不是完全清空 hash 回到主畫廊），
  // 這樣關掉作品詳細頁時，底層畫面才會精確回到總表頁面，而不是跳回其他主頁。
  suppressNextRouteModalClose=true;
  location.hash='actors';
  openDetail(id);

// 該演員被觀看過的所有場次，加總花費並統一換算成台幣
// 花費統計包含「已觀看」與「持有票券」，已退票或轉讓的不算是實際花費
function getActorSpendTWD(name){
  let total=0;
  db.forEach(d=>{
    if((d.category||'drama')!=='musical') return;
    (d.viewing_history||[]).forEach(h=>{
      if(!h || !countsTowardSpend(h)) return;
      const raw=(h.viewed_actors&&h.viewed_actors.length)?h.viewed_actors:h.cast;
      if(castNames(raw).includes(name)){
        total += convertToTWD(h.amount,h.currency||'TWD');
      }
    });
  });
  return total;
}

// 演員卡片的分類分頁狀態：只在切換到「不同一位演員」時重置回「全部」，
// 同一位演員卡片內切分頁（全部/音樂劇/影視）不會互相干擾。
let actorCardTab='all';
let actorCardCurrentName='';

function renderActorPage(name){
  const cardBg=document.getElementById('actor-card-bg');
  if(!cardBg) return; // 防呆：卡片容器不存在就不繼續

  if(actorCardCurrentName!==name){
    actorCardTab='all';
    actorCardCurrentName=name;
  }

  const works=getActorWorks(name);
  const categories=[...new Set(works.map(w=>w.category||'drama'))];
  const musicalWorks=works.filter(w=>(w.category||'drama')==='musical');
  const dramaWorks=works.filter(w=>(w.category||'drama')!=='musical');
  // 音樂劇累計次數：加總這位演員在每一部音樂劇裡被記錄觀看的場次（含重刷）
  const musicalCount=getActorShowCount(name);
  // 電視劇累計次數：電視劇沒有「多刷場次」的概念，累計次數＝符合條件（此演員參演）的劇集數
  const dramaCount=dramaWorks.length;
  const ratedWorks=works.filter(w=>w.rating&&w.rating>0);
  const avgRating=ratedWorks.length ? (ratedWorks.reduce((s,w)=>s+parseFloat(w.rating),0)/ratedWorks.length) : 0;

  const nameEl=document.getElementById('actor-page-name');
  if(nameEl) nameEl.textContent = name;

  // 找出這位演員在 musicalActors 名冊裡的節點（拿 id 給頭像／編輯／刪除按鈕用）
  const actorRecord=musicalActors.find(a=>a.name===name);

  const avatarEl=document.getElementById('actor-card-avatar');
  if(avatarEl) avatarEl.innerHTML = actorAvatarHtml(actorRecord||{name}, 'avatar-lg');

  const actionsEl=document.getElementById('actor-card-actions');
  if(actionsEl){
    actionsEl.innerHTML = actorRecord && !isReadOnly
      ? `<button class="icon-btn edit-btn" data-action="edit" style="font-size:12px;padding:4px 10px" data-id="${esc(actorRecord.id)}"><i class="ti ti-pencil"></i> 編輯</button>
         <button class="icon-btn delete-btn" data-action="delete" style="font-size:12px;padding:4px 10px;color:#B91C1C;border-color:#F5C6C6" data-id="${esc(actorRecord.id)}" data-name="${esc(actorRecord.name)}"><i class="ti ti-trash"></i> 刪除</button>`
      : '';
  }

  const tagsEl=document.getElementById('actor-page-tags');
  if(tagsEl){
    tagsEl.innerHTML = categories.map(c=>
      c==='musical'
        ? `<span class="badge" style="background:#EEEDFE;color:#3C3489"><i class="ti ti-music" style="font-size:11px;margin-right:3px"></i>音樂劇</span>`
        : `<span class="badge" style="background:#F5F5FA;color:#666"><i class="ti ti-device-tv" style="font-size:11px;margin-right:3px"></i>影劇</span>`
    ).join('');
  }

  const summaryEl=document.getElementById('actor-page-summary');
  if(summaryEl){
    const stat=(num,label)=>`<div class="actor-summary-stat"><span class="actor-summary-num">${num}</span><span class="actor-summary-label">${label}</span></div>`;
    let html = stat(works.length,'作品總數');
    if(musicalWorks.length) html += stat(musicalCount,'音樂劇累計次數');
    if(dramaWorks.length) html += stat(dramaCount,'電視劇累計次數');
    const spendTWD=getActorSpendTWD(name);
    if(spendTWD>0) html += stat('NT$'+Math.round(spendTWD).toLocaleString(),'累計花費（台幣）');
    if(avgRating>0) html += stat('⭐ '+avgRating.toFixed(1),'平均評分');
    summaryEl.innerHTML = html;
  }

  refreshActorCardTabsAndWorks(name);
  cardBg.classList.add('open');
}

// 演員跨足音樂劇＋影視時，用分頁（全部／音樂劇／影視）分開列出，避免兩種完全不同性質的紀錄混在一起；
// 只有單一領域的演員就不需要分頁，直接顯示全部作品。切換分頁只重繪這一小塊，不用整張卡片重新渲染。
function refreshActorCardTabsAndWorks(name){
  const works=getActorWorks(name);
  const musicalWorks=works.filter(w=>(w.category||'drama')==='musical');
  const dramaWorks=works.filter(w=>(w.category||'drama')!=='musical');

  const tabsEl=document.getElementById('actor-card-tabs');
  if(tabsEl){
    if(musicalWorks.length && dramaWorks.length){
      const tabs=[['all','全部',works.length],['musical','音樂劇',musicalWorks.length],['drama','影視',dramaWorks.length]];
      tabsEl.innerHTML=tabs.map(([val,label,count])=>
        `<button class="filter-chip${actorCardTab===val?' active':''}" onclick="setActorCardTab('${val}','${jsStr(name)}')">${esc(label)} (${count})</button>`
      ).join('');
    }else{
      tabsEl.innerHTML='';
      actorCardTab='all'; // 只有單一領域，沒有分頁可切，強制回到「全部」避免卡在篩選不到東西的狀態
    }
  }

  const filtered = actorCardTab==='all' ? works : works.filter(w=>(w.category||'drama')===actorCardTab);
  const worksEl=document.getElementById('actor-page-works');
  if(worksEl){
    if(filtered.length){
      renderActorWorksList(filtered, worksEl, name);
    }else{
      worksEl.className='';
      worksEl.innerHTML='<p style="color:#999;font-size:13px;padding:10px 0">這個分類目前沒有作品紀錄</p>';
    }
  }
}

// 切換演員卡片的分類分頁
function setActorCardTab(tab,name){
  actorCardTab=tab;
  refreshActorCardTabsAndWorks(name);
}

// 統一的路由處理：解析目前的 hash，決定人物總表頁面／演員懸浮卡片各自要不要顯示。
// #actors        → 只顯示人物總表頁面
// #actor/<姓名>  → 人物總表頁面當底層（若還沒開會自動打開），懸浮卡片疊在上面
// 其他 hash      → 兩層都關閉，回到一般的畫廊畫面
function handleRoute(){
  const hash=location.hash||'';
  const actorMatch=hash.match(/^#actor\/(.+)$/);
  const isActorsRoute = hash==='#actors' || !!actorMatch;

  // detail-modal 不是路由狀態的一部分（單純用 class 開關），所以每次 hash 改變
  // （不管是點擊關閉按鈕，還是使用者按瀏覽器的上一頁）都順手把它關掉，
  // 避免舊的作品詳細頁疊在新畫面上方，造成「關閉後畫面卻沒對上」的錯覺。
  // 但如果這次 hash 改變是 openWorkFromActorCard 自己觸發的（正要打開 detail-modal），
  // 就跳過這一次自動關閉，否則非同步的 hashchange 會把剛打開的視窗立刻關掉。
  if(suppressNextRouteModalClose){
    suppressNextRouteModalClose=false;
  }else{
    closeModal('detail-modal');
  }

  if(isActorsRoute){
    openActorsListPage();
  }else{
    const listPage=document.getElementById('actors-list-page');
    if(listPage) listPage.classList.remove('open');
  }

  if(actorMatch){
    renderActorPage(decodeURIComponent(actorMatch[1]));
  }else{
    const cardBg=document.getElementById('actor-card-bg');
    if(cardBg) cardBg.classList.remove('open');
  }
}
window.addEventListener('hashchange', handleRoute);

// 事件委派：演員卡片是動態渲染出來的（每次開卡片、切分頁都會整段重寫 innerHTML），
// 如果每次渲染都重新綁一次 onclick，久了容易忘記清掉舊的、或忘記某個地方漏綁。
// 改成只在 document 上綁「一次」監聽器，用 class／id 找目標——不管按鈕是什麼時候被塞進 DOM 的都抓得到，
// 也不用再把 id／姓名這些值手動拼進 onclick 字串裡（順便避開了字串轉義出錯的整類問題）。
//
// 這裡也順便處理「點卡片背景關閉」：這行原本用 document.getElementById('actor-card-bg')
// 直接綁監聽器，但這段 script 在檔案裡的位置比 #actor-card-bg 這個 HTML 元素本身還早執行，
// 那時候 getElementById 根本找不到元素、回傳 null，這個監聽器其實從來沒有真的綁上去過。
// 改用 document 層級的事件委派就不會有「元素還沒出生」的問題。
//
// 防呆：用 window.__actorClickDelegationBound 當作旗標，確保這個監聽器只會被綁定「一次」。
// 如果目前的預覽/測試環境會在同一個頁面內重複執行這段 <script>（沒有整頁重新整理），
// 沒有這個防呆的話，同一個監聽器就會被疊加綁上去好幾次，同一次點擊就會觸發好幾次
// （這正是主控台裡同一個 data-id 連續印出好幾次「🔥」的原因）。
if(!window.__actorClickDelegationBound){
  window.__actorClickDelegationBound = true;
  document.addEventListener('click', function(e){
    console.log('🔥 document click listener 有在執行，target 是：', e.target);

    if(e.target.id==='actor-card-bg'){ closeActorPage(); return; }

    // 用 .closest() 而不是 .matches()：如果點到按鈕裡面的圖示 <i> 而不是按鈕本身，
    // e.target 會是那個 <i>，.matches('.edit-btn') 會抓不到，但 .closest() 會往上找到按鈕本身。
    // data-action 是備援選取器，就算 class 名稱以後又改了，這裡也還抓得到。
    const editBtn=e.target.closest('.edit-btn') || e.target.closest('button[data-action="edit"]');
    if(editBtn){
      console.log('🔥 系統成功偵測到編輯按鈕被點擊了！data-id =', editBtn.dataset.id);
      editActor(editBtn.dataset.id);
      return;
    }
    const deleteBtn=e.target.closest('.delete-btn') || e.target.closest('button[data-action="delete"]');
    if(deleteBtn){
      console.log('🔥 系統成功偵測到刪除按鈕被點擊了！data-id =', deleteBtn.dataset.id);
      deleteActorNode(deleteBtn.dataset.id, deleteBtn.dataset.name);
      return;
  }
  });
}

let actorsSearchQuery='';
let actorsCategoryFilter='all'; // 'all' | 'musical' | 'drama'

// 依目前的搜尋字串與分類篩選器，計算每位演員的觀看場次並回傳要顯示的清單
// 依 actor_type 欄位判斷這位演員屬於哪個分類：空值／NULL 一律預設歸類在「音樂劇演員」；
// 有值的話，內容含「影劇」或「電視」才算影劇演員，其餘（含自訂文字）都算音樂劇演員。
// 依 actor_type 欄位判斷這位演員屬於哪個分類：空值／NULL 一律預設歸類在「音樂劇演員」；
// 有值的話，內容含「影劇」或「電視」才算影劇演員，其餘（含自訂文字）都算音樂劇演員。
// 這個函式用在「手動設定的 actor_type」上；真正撈總表清單時，優先用下面 computeActorCategoryTags()
// 直接依實際演出紀錄自動判斷，比手動填的文字更準確。
function actorTypeCategory(actorType){
  const t=(actorType||'').trim();
  if(!t) return 'musical';
  return (t.includes('影劇')||t.includes('電視')) ? 'drama' : 'musical';
}

// 該演員參演的電視劇（非音樂劇）作品數。電視劇沒有「場次」概念，這裡的「次數」＝符合條件的劇集數，
// 跟 getActorShowCount()（音樂劇累計場次）搭配使用，兩者相加就是總觀看次數。
function getDramaWorkCount(name){
  return db.filter(d=>(d.category||'drama')!=='musical' && castNames(d.actors).includes(name)).length;
}

// 整合總表清單：以 musical_actors 表為主，額外把「只出現在電視劇資料、但還沒被登記成正式節點」的
// 演員也一起撈出來、暫時合併進清單（沒有真正的 Supabase id，所以不能編輯/刪除，只能瀏覽跟篩選；
// 一旦透過編輯功能替他建檔，就會自動變成正式節點）。每個演員身上記錄「_sources」：
// 這個人有沒有音樂劇演出紀錄、有沒有電視劇演出紀錄，用來判斷該顯示哪個分類標籤。
function getUnifiedActorRoster(){
  const roster=musicalActors.map(a=>({...a,_sources:new Set()}));
  const byName={};
  roster.forEach(a=>{ byName[a.name]=a; });

  db.forEach(d=>{
    const isMusical=(d.category||'drama')==='musical';
    const names=isMusical
      ? castNames((d.actors_all&&d.actors_all.length)?d.actors_all:d.actors)
      : castNames(d.actors);
    names.forEach(name=>{
      if(!name) return;
      if(!byName[name]){
        // 電視劇資料裡才會出現「musical_actors 表完全沒有的新名字」，音樂劇的情況本來就是從
        // musical_actors 表撈出來的名單，理論上不會撈到表裡沒有的人。
        const virtual={id:'drama-only-'+name,name,profile_image:null,actor_type:null,_sources:new Set(),_virtual:true};
        byName[name]=virtual;
        roster.push(virtual);
      }
      byName[name]._sources.add(isMusical?'musical':'drama');
    });
  });
  // 也把音樂劇的每場觀看紀錄掃過一次，確保「只在某一場被記錄過、但沒被列進主要演員」的人也算數
  db.forEach(d=>{
    if((d.category||'drama')!=='musical') return;
    (d.viewing_history||[]).forEach(h=>{
      if(!h) return;
      const raw=(h.viewed_actors&&h.viewed_actors.length)?h.viewed_actors:h.cast;
      castNames(raw).forEach(name=>{ if(byName[name]) byName[name]._sources.add('musical'); });
    });
  });

  return roster;
}

// 依實際演出紀錄自動判斷這位演員的分類標籤與所屬分類（可能同時屬於兩個分類）。
// 兩邊都有紀錄 → 雙棲演員；只有一邊 → 對應分類；兩邊都沒有（純候選、還沒被記錄任何演出）
// → 退回手動設定的 actor_type，沒設定就預設音樂劇演員。
function computeActorCategoryTags(actor){
  const hasMusical=actor._sources && actor._sources.has('musical');
  const hasDrama=actor._sources && actor._sources.has('drama');
  if(hasMusical && hasDrama) return {label:'雙棲演員',categories:['musical','drama']};
  if(hasDrama) return {label:'影劇演員',categories:['drama']};
  if(hasMusical) return {label:'音樂劇演員',categories:['musical']};
  return {label:actor.actor_type||'音樂劇演員',categories:[actorTypeCategory(actor.actor_type)]};
}

function getFilteredActorsList(){
  const roster=getUnifiedActorRoster();

  const q=actorsSearchQuery.trim().toLowerCase();
  return roster
    .filter(a=>!q||a.name.toLowerCase().includes(q))
    .map(a=>{
      const tags=computeActorCategoryTags(a);
      const musicalCount=getActorShowCount(a.name);
      const dramaCount=getDramaWorkCount(a.name);
      return {
        id:a.id,
        name:a.name,
        profile_image:a.profile_image,
        typeLabel:tags.label,
        categories:tags.categories,
        count:musicalCount+dramaCount // 總觀看次數＝音樂劇累計次數＋電視劇累計次數
      };
    })
    .filter(a=>actorsCategoryFilter==='all' || a.categories.includes(actorsCategoryFilter))
    // 預設依總觀看次數由多到少排序，最常看的演員排最前面；次數相同時依姓名排序，順序才穩定不會亂跳
    .sort((a,b)=> b.count-a.count || a.name.localeCompare(b.name,'ko'));
}

// 直接從人物總表刪除單一演員節點（不用跑整個批次清理流程）。
// 如果這個名字其實是某個乾淨姓名的髒版本（例如「박준휘[3]」→「박준휘」），
// 會先把資料庫裡所有引用到它的場次記錄正規化、轉移到乾淨姓名下，確保場次數字不會憑空消失，
// 再刪除這個節點。如果本來就救不回一個像樣的姓名（例如破損的「ㄷ」），就直接刪除。
async function deleteActorNode(id,name){
  const cleanNames=normalizeCastValue(name).map(c=>c.name);
  const isRecoverable = cleanNames.length>0 && !(cleanNames.length===1 && cleanNames[0]===name);

  const confirmMsg = isRecoverable
    ? `即將刪除「${name}」，並將其場次記錄轉移到「${cleanNames.join('、')}」，確定嗎？`
    : `即將直接刪除「${name}」這個演員節點（無法辨識出有效姓名，此操作無法復原），確定嗎？`;
  if(!confirm(confirmMsg)) return;

  if(isRecoverable){
    db.forEach(item=>{
      if(!item || item.category!=='musical') return;
      if(item.actors) item.actors=normalizeCastArray(item.actors);
      if(item.actors_all) item.actors_all=normalizeCastArray(item.actors_all);
      (item.viewing_history||[]).forEach(show=>{
        if(!show) return;
        const raw=(show.viewed_actors&&show.viewed_actors.length)?show.viewed_actors:show.cast;
        show.viewed_actors=normalizeCastArray(raw);
      });
    });
    save();
    for(const n of cleanNames){
      if(!musicalActors.some(a=>a.name===n)) await addMusicalActor(n);
    }
  }

  await deleteMusicalActorRow(id);
  if(sb) await loadMusicalActors();
  renderActorsGrid();
  // 如果是從這位演員的詳細卡片裡按刪除，人已經不存在了，回到總表頁面而不是停留在一個空卡片上
  if(location.hash.startsWith('#actor/')) location.hash='actors';
}

// 🧹 演員資料清理（正規化 / 去重 / 觀看場次歸位）
// 解決「人物總表」晶片格式混亂的問題：舊資料裡的演員欄位可能是
//   ① 純字串   "演員A"
//   ② 角色配對 "角色｜演員A" 或 "角色：演員A"（角色黏在名字裡，沒有拆開）
//   ③ 多人合併 "演員A, 演員B"（好幾個人擠在同一個欄位/同一個 chip）
// 這一段只做「解析＋預覽」，實際寫回資料要按下預覽視窗裡的「確認套用」才會執行。
// ════════════════════════════════════════════════════════════════

// 合法姓名格式：純文字姓名（可含空白），最後可以選擇性加上「(數字)」做同名區分
// 例如「이석준(99)」代表「第 99 號的이석준」，用來區分同名不同人，這個格式視為合法、不清理。
// 除此之外的任何符號（方括號、冒號、逗號、豎線…）都視為格式異常；
// 姓名本體長度小於 2（例如殘破的單一字母/注音）也視為異常，因為不可能是完整的人名。
const VALID_NAME_RE=/^[\p{L}\p{M}\s]+(\(\d+\))?$/u;
function isValidActorName(name){
  if(typeof name!=='string') return false;
  const trimmed=name.trim();
  if(!trimmed) return false;
  if(!VALID_NAME_RE.test(trimmed)) return false;
  const base=trimmed.replace(/\(\d+\)$/,'').trim();
  return base.length>=2;
}
function isMessyActorName(name){
  return !isValidActorName(name);
}
// 嘗試把一個原始姓名字串清理成合法格式：本來就合法（含「姓名(數字)」同名區分格式）就直接保留；
// 否則試著去掉尾端的括號／方括號標記（例如「박준휘[3]」→「박준휘」）再檢查一次；
// 如果清完還是不合法（代表本來就是殘破資料，救不回來），回傳空字串，呼叫端會濾掉、不留垃圾節點。
function cleanActorName(raw){
  const s=String(raw||'').trim();
  if(isValidActorName(s)) return s;
  const stripped=s.replace(/[\[\(（【][^\]\)）】]*[\]\)）】]\s*$/,'').trim();
  if(isValidActorName(stripped)) return stripped;
  return '';
}

// 把「一筆」可能混亂的卡司資料（字串或 {role,name} 物件）正規化成
// 乾淨的 [{role,name}, ...] 陣列——名字只保留「純演員姓名」作為唯一識別鍵，
// 角色會被拆出來獨立存放；一個欄位裡黏了多個人也會拆成多筆；不合法的姓名格式（非「姓名」或「姓名(數字)」）
// 會嘗試去掉尾端括號標記後再檢查一次，仍救不回來的（例如殘破的單一字元）會被直接濾掉。
function normalizeCastValue(raw){
  if(!raw) return [];
  let role='', text;
  if(typeof raw==='object'){
    role=(raw.role||'').trim();
    text=String(raw.name||'');
  }else{
    text=String(raw);
  }
  const pipeMatch=text.match(/^(.+?)[|｜](.*)$/);
  if(pipeMatch){
    role = role || pipeMatch[1].trim();
    text = pipeMatch[2];
  }else{
    const colonMatch=text.match(/^(.+?)[：:](.*)$/);
    if(colonMatch){
      role = role || colonMatch[1].trim();
      text = colonMatch[2];
    }
  }
  return text.split(/[,，、]/).map(s=>cleanActorName(s)).filter(Boolean).map(name=>({role,name}));
}

// 正規化整個卡司陣列：攤平＋依「角色＋姓名」組合鍵去重
// （姓名不是主鍵，同一位演員可能一人分飾多角，只用姓名去重會誤刪掉他的其他角色）
function normalizeCastArray(list){
  const out=[]; const seen=new Set();
  (list||[]).forEach(item=>{
    normalizeCastValue(item).forEach(c=>{
      if(!c.name) return;
      const key=(c.role||'')+'\u0001'+c.name;
      if(seen.has(key)) return;
      seen.add(key);
      out.push(c);
    });
  });
  return out;
}

// 乾跑（dry-run）：不寫入任何資料，只計算「清理前 vs 清理後」的對照結果，供預覽確認。
// 回傳 { messyEntries, cleanNameCounts, unchangedCount }
function buildActorsCleanupPlan(){
  // 清理前：目前 musicalActors 名單裡，凡是格式有問題的，各自要拆成哪些乾淨姓名
  const messyEntries = musicalActors
    .filter(a => isMessyActorName(a.name))
    .map(a => ({ oldName: a.id, oldLabel: a.name, splitInto: normalizeCastValue(a.name).map(c=>c.name) }));

  // 清理後：把整個 db 的卡司欄位（主要演員／候選名單／每場記錄）都正規化，
  // 用正規化後的資料重新計算每位「乾淨演員姓名」的正確觀看場次總數。
  const cleanNameCounts = {};
  const bumpCount = (name) => { cleanNameCounts[name] = (cleanNameCounts[name]||0) + 1; };

  db.forEach(item=>{
    if(!item || item.category!=='musical') return;
    (item.viewing_history||[]).forEach(show=>{
      if(!show) return;
      const raw = (show.viewed_actors && show.viewed_actors.length) ? show.viewed_actors : show.cast;
      normalizeCastArray(raw).forEach(c => bumpCount(c.name));
    });
  });

  // 沒有任何觀看紀錄、但曾出現在主要演員／候選名單裡的乾淨姓名，也要列進清單（計數 0）
  const allCleanNames = new Set(Object.keys(cleanNameCounts));
  musicalActors.forEach(a=>{
    normalizeCastValue(a.name).forEach(c=>{
      if(!allCleanNames.has(c.name)){ allCleanNames.add(c.name); cleanNameCounts[c.name]=cleanNameCounts[c.name]||0; }
    });
  });

  const unchangedCount = musicalActors.filter(a=>!isMessyActorName(a.name)).length;
  return { messyEntries, cleanNameCounts, unchangedCount };
}

function openActorsCleanupPreview(){
  const bg=document.getElementById('actors-cleanup-modal-bg');
  const body=document.getElementById('actors-cleanup-body');
  if(!bg || !body) return; // 防呆：找不到容器就不繼續

  const plan = buildActorsCleanupPlan();
  window.__actorsCleanupPlan = plan; // 暫存，供「確認套用」使用，避免重複計算

  if(!plan.messyEntries.length){
    body.innerHTML = `<p style="color:#888;font-size:13px;padding:10px 0">目前沒有偵測到格式混亂的演員資料，不需要清理 🎉</p>`;
    const confirmBtn=document.getElementById('actors-cleanup-confirm-btn');
    if(confirmBtn) confirmBtn.style.display='none';
  }else{
    const rows = plan.messyEntries.map(m=>{
      const newNamesHtml = m.splitInto.length
        ? m.splitInto.map(n=>{
            const c = plan.cleanNameCounts[n]||0;
            return `<span class="actor-pill">${esc(n)}<span style="color:#8B86D4;font-weight:700">（${c}場）</span></span>`;
          }).join(' ')
        : `<span style="color:#999;font-size:12px">（無法辨識為有效姓名，將直接刪除）</span>`;
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F0F0F5;flex-wrap:wrap">
        <span style="color:#B91C1C;text-decoration:line-through;font-size:13px;flex-shrink:0">${esc(m.oldLabel)}</span>
        <span style="color:#ccc">→</span>
        <div style="display:flex;flex-wrap:wrap;gap:5px">${newNamesHtml}</div>
      </div>`;
    }).join('');
    body.innerHTML = `
      <p style="font-size:13px;color:#3C3489;font-weight:700;margin-bottom:6px">將拆解 / 修正 ${plan.messyEntries.length} 筆格式錯誤的節點：</p>
      ${rows}
      <p style="color:#888;font-size:12px;margin-top:12px">另有 ${plan.unchangedCount} 位演員格式正確，不會被更動。</p>
    `;
    const confirmBtn=document.getElementById('actors-cleanup-confirm-btn');
    if(confirmBtn) confirmBtn.style.display='';
  }
  bg.classList.add('open');
}

function closeActorsCleanupModal(){
  const bg=document.getElementById('actors-cleanup-modal-bg');
  if(bg) bg.classList.remove('open');
}

// 使用者在預覽視窗按下「確認套用」後才會執行：
// 1) 正規化 db 裡每部音樂劇的 actors / actors_all / 每場 viewing_history 的卡司欄位
// 2) 把乾淨姓名補進 musicalActors（若尚未存在），並刪除格式錯誤的舊節點
// 3) save() 寫回 localStorage / Supabase，重新載入名單並重繪畫面
async function confirmActorsCleanup(){
  const plan = window.__actorsCleanupPlan;
  if(!plan){ closeActorsCleanupModal(); return; }
  const btn=document.getElementById('actors-cleanup-confirm-btn');
  if(btn){ btn.disabled=true; btn.textContent='套用中…'; }

  // 1) 正規化整個 db 的卡司欄位
  db.forEach(item=>{
    if(!item || item.category!=='musical') return;
    if(item.actors) item.actors = normalizeCastArray(item.actors);
    if(item.actors_all) item.actors_all = normalizeCastArray(item.actors_all);
    (item.viewing_history||[]).forEach(show=>{
      if(!show) return;
      const raw = (show.viewed_actors && show.viewed_actors.length) ? show.viewed_actors : show.cast;
      show.viewed_actors = normalizeCastArray(raw);
    });
  });
  save();

  // 2) 補上尚未存在於 musicalActors 的乾淨姓名
  const cleanNames = Object.keys(plan.cleanNameCounts);
  for(const name of cleanNames){
    if(!musicalActors.some(a=>a.name===name)){
      await addMusicalActor(name);
    }
  }
  // 刪除已經被拆解掉的格式錯誤節點
  for(const m of plan.messyEntries){
    await deleteMusicalActorRow(m.oldName);
  }

  if(sb) await loadMusicalActors();
  else musicalActors = musicalActors.filter(a=>!isMessyActorName(a.name));

  closeActorsCleanupModal();
  renderActorsGrid();
  if(btn){ btn.disabled=false; btn.textContent='確認套用'; }
  alert('演員資料清理完成！');
}

// 刪除單一 musical_actors 節點（用於清掉格式錯誤的舊資料）。
// 本機模式（沒有連 Supabase）直接從記憶體陣列移除即可。
async function deleteMusicalActorRow(id){
  musicalActors = musicalActors.filter(a=>String(a.id)!==String(id));
  if(!sb || String(id).startsWith('local-')) return;
  try{
    const {error}=await sb.from('musical_actors').delete().eq('id',id);
    if(error) throw error;
  }catch(e){
    console.error('Failed to delete musical actor', id, e);
  }
}
